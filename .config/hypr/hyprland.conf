#!/bin/sh
# ~/.config/hypr/hyprland.conf
# Ported from river-classic config.
# Prefix/prefix2 submaps mirror the river modal keybinding scheme.

# ─── A) Monitors ──────────────────────────────────────────────────────────────
monitor=DP-11,1920x1080@60,0x0,1,transform,1
monitor=DP-13,1920x1080@60,1080x0,1
monitor=eDP-1,2880x1920@60,1080x1080,1.75
monitor=,preferred,auto,1

exec-once = ~/.config/hypr/scripts/monitor_setup.sh

# ─── B) Environment Variables ─────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_IM_MODULES,wayland;fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus
env = GTK_THEME,Arc-Dark
env = QT_STYLE_OVERRIDE,adwaita
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GCM_PROFILE_FILE,/usr/share/color/icc/framework-2.8k.icc
env = ICC_PROFILE,/usr/share/color/icc/framework-2.8k.icc
env = XCURSOR_THEME,Breeze5
env = XCURSOR_SIZE,24

# ─── C) Autostart ─────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XAUTHORITY
exec-once = killall fcitx5; fcitx5 -d
exec-once = dunst
exec-once = pkill -9 polkit-gnome-authentication-agent-1; /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wlsunset
exec-once = waybar --config ~/.config/waybar/config-hyprland.jsonc
exec-once = swayidle timeout 1200 'swaylock -f --color 000000' before-sleep 'swaylock -f --color 000000'

# ─── D) Input ─────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    kb_options   = ctrl:nocaps
    follow_mouse = 1
    mouse_refocus = true
    repeat_rate  = 45
    repeat_delay = 195
    touchpad {
        natural_scroll = true
    }
}

cursor {
    warp_on_change_workspace = true
}

# ─── E) General / Borders ─────────────────────────────────────────────────────
general {
    gaps_in          = 0
    gaps_out         = 0
    border_size      = 2
    col.active_border   = 0xff9933cc   # purple
    col.inactive_border = 0xff8b877c   # taupe
    layout           = master
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    background_color = 0x02091C
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ─── F) Master Layout ─────────────────────────────────────────────────────────
master {
    new_status  = slave
    mfact       = 0.55
    orientation = left
}

# ─── G) Floating Rules ────────────────────────────────────────────────────────
windowrule = match:class Yad,                        float on
windowrule = match:class Galculator,                 float on
windowrule = match:class Blueberry.py,               float on
windowrule = match:class Xsane,                      float on
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class qt5ct,                      float on
windowrule = match:class Bluetooth-sendto,           float on
windowrule = match:class Pamac-manager,              float on
windowrule = match:title About,                      float on
windowrule = match:class Launcher,                   float on

# ─── H) Keybindings: No-Prefix ────────────────────────────────────────────────

# Volume (repeatable)
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume_up.sh
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume_down.sh
bindl  = , XF86AudioMute,         exec, ~/.config/hypr/scripts/toggle_mute.sh
bindel = , Prior,                 exec, ~/.config/hypr/scripts/volume_up.sh
bindel = , Next,                  exec, ~/.config/hypr/scripts/volume_down.sh

# Brightness (repeatable)
bindel = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness_up.sh
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness_down.sh

# Media
bindl = , XF86AudioPlay, exec, ~/.config/hypr/scripts/media_play_pause.sh
bindl = , XF86AudioNext, exec, ~/.config/hypr/scripts/media_next.sh
bindl = , XF86AudioPrev, exec, ~/.config/hypr/scripts/media_prev.sh

# Emergency exit / reload
bind = CTRL ALT, Delete, exit,
bind = SUPER SHIFT, E,   exit,
bind = SUPER SHIFT, R,   exec, hyprctl reload

# Enter prefix submap on Super press
bind = , Super_L, submap, prefix
bind = , Super_R, submap, prefix

# ─── I) prefix Submap ─────────────────────────────────────────────────────────
submap = prefix

# Double-tap Super → prefix2
bind = , Super_L, submap, prefix2
bind = , Super_R, submap, prefix2

# Escape / Ctrl+[ → normal
bind = , escape,          submap, reset
bind = CTRL, bracketleft, submap, reset

# ── Window ops ──
bind = , q,      killactive,
bind = , q,      submap, reset

bind = , return, exec,   ~/.config/hypr/scripts/samedir_kitty.sh
bind = , return, submap, reset

# ── Focus ──
bind = , j, layoutmsg, cyclenext
bind = , j, submap,    reset
bind = , k, layoutmsg, cycleprev
bind = , k, submap,    reset

# ── Output focus ──
bind = , n, focusmonitor, +1
bind = , n, submap,       reset
bind = , p, focusmonitor, -1
bind = , p, submap,       reset

# ── Swap in stack ──
bind = , period, layoutmsg, swapnext
bind = , period, submap,    reset
bind = , comma,  layoutmsg, swapprev
bind = , comma,  submap,    reset

# ── Send window to another output ──
bind = , bracketright, movewindow, mon:+1
bind = , bracketright, submap,     reset
bind = , bracketleft,  movewindow, mon:-1
bind = , bracketleft,  submap,     reset

# ── Float / fullscreen ──
bind = , c, togglefloating,
bind = , c, submap, reset
bind = , f, fullscreen,
bind = , f, submap, reset

# ── Launchers ──
bind = , d,      exec,   ~/.config/hypr/scripts/launch_wofi_drun.sh
bind = , d,      submap, reset
bind = SHIFT, d, exec,   ~/.config/hypr/scripts/launch_wofi_window.sh
bind = SHIFT, d, submap, reset

# ── Layout orientation (set manually per monitor as needed) ──
bind = , y, layoutmsg, orientationleft
bind = , y, submap,    reset
bind = , i, layoutmsg, orientationtop
bind = , i, submap,    reset
bind = , o, layoutmsg, orientationright
bind = , o, submap,    reset
bind = , u, layoutmsg, orientationbottom
bind = , u, submap,    reset

# ── Main ratio ──
bind = , g,      exec,   hyprctl dispatch layoutmsg "mfact +0.05"
bind = , g,      submap, reset
bind = SHIFT, g, exec,   hyprctl dispatch layoutmsg "mfact -0.05"
bind = SHIFT, g, submap, reset

# ── Main count ──
bind = SHIFT, equal, layoutmsg, addmaster
bind = SHIFT, equal, submap,    reset
bind = , minus,      layoutmsg, removemaster
bind = , minus,      submap,    reset




# ── Stack rotation ([A,B,C,D] → [B,C,D,A]) ──
bind = , r, exec,   ~/.config/hypr/scripts/rotate_stack_reverse.sh
bind = , r, submap, reset

# ── Input method toggle ──
bind = CTRL, space, exec,   ~/.config/hypr/scripts/cycle_input_method.sh
bind = CTRL, space, submap, reset

# ── Global workspace switching (all monitors → workspace N) ──
bind = , 1, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 1
bind = , 1, submap, reset
bind = , 2, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 2
bind = , 2, submap, reset
bind = , 3, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 3
bind = , 3, submap, reset
bind = , 4, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 4
bind = , 4, submap, reset
bind = , 5, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 5
bind = , 5, submap, reset
bind = , 6, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 6
bind = , 6, submap, reset
bind = , 7, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 7
bind = , 7, submap, reset
bind = , 8, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 8
bind = , 8, submap, reset
bind = , 9, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 9
bind = , 9, submap, reset
bind = , 0, exec,   ~/.config/hypr/scripts/set_global_workspace.sh 10
bind = , 0, submap, reset

# ── Move focused view to workspace ──
bind = SHIFT, 1, movetoworkspacesilent, 1
bind = SHIFT, 1, submap, reset
bind = SHIFT, 2, movetoworkspacesilent, 2
bind = SHIFT, 2, submap, reset
bind = SHIFT, 3, movetoworkspacesilent, 3
bind = SHIFT, 3, submap, reset
bind = SHIFT, 4, movetoworkspacesilent, 4
bind = SHIFT, 4, submap, reset
bind = SHIFT, 5, movetoworkspacesilent, 5
bind = SHIFT, 5, submap, reset
bind = SHIFT, 6, movetoworkspacesilent, 6
bind = SHIFT, 6, submap, reset
bind = SHIFT, 7, movetoworkspacesilent, 7
bind = SHIFT, 7, submap, reset
bind = SHIFT, 8, movetoworkspacesilent, 8
bind = SHIFT, 8, submap, reset
bind = SHIFT, 9, movetoworkspacesilent, 9
bind = SHIFT, 9, submap, reset
bind = SHIFT, 0, movetoworkspacesilent, 10
bind = SHIFT, 0, submap, reset

submap = reset

# ─── J) prefix2 Submap ────────────────────────────────────────────────────────
submap = prefix2

# ── Stack rotation reverse ([A,B,C,D] → [D,A,B,C]) ──
bind = , r, exec,   ~/.config/hypr/scripts/rotate_stack.sh
bind = , r, submap, reset

# Double-tap Super exits
bind = , Super_L,         submap, reset
bind = , Super_R,         submap, reset
bind = , escape,          submap, reset
bind = CTRL, bracketleft, submap, reset

# ── Per-monitor (local) workspace switching ──
bind = , 1, workspace, 1
bind = , 1, submap,    reset
bind = , 2, workspace, 2
bind = , 2, submap,    reset
bind = , 3, workspace, 3
bind = , 3, submap,    reset
bind = , 4, workspace, 4
bind = , 4, submap,    reset
bind = , 5, workspace, 5
bind = , 5, submap,    reset
bind = , 6, workspace, 6
bind = , 6, submap,    reset
bind = , 7, workspace, 7
bind = , 7, submap,    reset
bind = , 8, workspace, 8
bind = , 8, submap,    reset
bind = , 9, workspace, 9
bind = , 9, submap,    reset
bind = , 0, workspace, 10
bind = , 0, submap,    reset

# ── Apps ──
bind = , e, exec,   emacsclient -c
bind = , e, submap, reset
bind = , n, exec,   neovide
bind = , n, submap, reset
bind = , d, exec,   ~/.config/hypr/scripts/launch_zsh_runner.sh
bind = , d, submap, reset

submap = reset

# ─── K) Mouse Bindings ────────────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind  = SUPER, mouse:274, togglefloating,

# ─────────────────────────────────────────────────────────────────────────────
# END OF CONFIG
# ─────────────────────────────────────────────────────────────────────────────
