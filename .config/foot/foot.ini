# foot terminal config
# https://codeberg.org/dnkl/foot/src/branch/master/foot.ini

font=monospace:size=11
dpi-aware=yes

# Match kitty's 20000-line scrollback
[scrollback]
lines=20000
multiplier=3.0
indicator-position=relative
indicator-format=line

[key-bindings]
# Ctrl+Shift+H — full scrollback (your shell history).
pipe-scrollback=[/home/jordan/.config/foot/dump-to-nvim.sh] Control+Shift+h
# Ctrl+Shift+Y — visible screen only. Works in nmtui/htop/less because
# alternate-screen TUIs don't write to scrollback.
pipe-visible=[/home/jordan/.config/foot/dump-to-nvim.sh] Control+Shift+y

[mouse]
hide-when-typing=yes

[cursor]
# No `style=` here — let nvim/other apps drive shape via DECSCUSR.
# Foot's default (block) applies in the shell where nothing overrides.
blink=yes

[colors-dark]
alpha=1.0

[csd]
preferred=server
