<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Alias the PDF’s CourierStd → CMU Typewriter Slashed -->
  <alias>
    <family>CourierStd</family>
    <prefer>
      <family>CMU Typewriter Slashed</family>
    </prefer>
  </alias>

  <!-- Alias bold/italic variants too -->
  <alias>
    <family>CourierStd-Bold</family>
    <prefer>
      <family>CMU Typewriter Slashed</family>
      <style>Bold</style>
    </prefer>
  </alias>
  <alias>
    <family>CourierStd-BoldItalic</family>
    <prefer>
      <family>CMU Typewriter Slashed</family>
      <style>Bold Italic</style>
    </prefer>
  </alias>
  <alias>
    <family>CourierStd-Italic</family>
    <prefer>
      <family>CMU Typewriter Slashed</family>
      <style>Italic</style>
    </prefer>
  </alias>

  <!-- If you also want a generic monospace fallback -->
  <match target="pattern">
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>CMU Typewriter Slashed</string>
    </edit>
  </match>

</fontconfig>

